name: build-windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed to attach assets to a release

jobs:
  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxkbcommon-x11-0 libdbus-1-3 libxcb-cursor0 libgl1

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy

      - name: Test (Windows - full)
        if: runner.os == 'Windows'
        run: pytest

      - name: Test (Linux - CLI/backend only)
        if: runner.os == 'Linux'
        run: pytest --ignore=tests/gui

  security:
    name: Security scan (bandit + pip-audit)
    runs-on: ubuntu-latest
    # Single leg: scans are platform-independent; no need to repeat across the matrix.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: SAST (bandit)
        # -ll = medium-and-above severity gate; low findings are informational only.
        # To suppress a specific finding: add "# nosec <ID>  # reason" at the call site.
        run: bandit -r src -c pyproject.toml -ll

      - name: Dependency audit (pip-audit)
        # Blocking. To accept an unfixable transitive advisory, add:
        #   pip-audit --ignore-vuln <VULN-ID>
        # and document the justification in this file.
        run: pip-audit

  build-windows:
    name: Build Windows binaries
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,build]"

      - name: Build CLI
        run: pyinstaller --onefile --console --name jwe-cli --paths src --hidden-import keyring.backends.Windows src/jwe/__main__.py

      - name: Build GUI
        run: pyinstaller --onefile --windowed --name jwe-gui --paths src --hidden-import keyring.backends.Windows src/jwe/gui_main.py

      - name: Compute SHA-256
        shell: pwsh
        run: |
          Get-FileHash dist/jwe-cli.exe -Algorithm SHA256 | Format-List
          Get-FileHash dist/jwe-gui.exe -Algorithm SHA256 | Format-List
          $hashCli = (Get-FileHash dist/jwe-cli.exe -Algorithm SHA256).Hash.ToLower()
          $hashGui = (Get-FileHash dist/jwe-gui.exe -Algorithm SHA256).Hash.ToLower()
          "$hashCli  jwe-cli.exe" | Out-File -FilePath dist/SHA256SUMS.txt -Encoding ascii
          "$hashGui  jwe-gui.exe" | Out-File -FilePath dist/SHA256SUMS.txt -Append -Encoding ascii

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/jwe-cli.exe
            dist/jwe-gui.exe
            dist/SHA256SUMS.txt
