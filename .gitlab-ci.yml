# GitLab CI/CD for jira-worklog-exporter
#
# Stufe 1: test matrix only (no build, no release artefacts yet).
# Linux 3.12/3.13 and Windows 3.12/3.13, mirroring the GitHub Actions matrix.
#
# Triggered on:
# - pushes to main branch
# - tag pushes matching v*
# Feature branches do not trigger to conserve free-tier compute minutes.
#
# References:
# - https://docs.gitlab.com/ci/runners/hosted_runners/linux/
# - https://docs.gitlab.com/ci/runners/hosted_runners/windows/
# - Free tier: 400 compute minutes/month, no OS multiplier (2026)

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v.*/

stages:
  - lint
  - test
  - security

# ---------------------------------------------------------------------------
# Lint job: Linux, fast, runs once (not in matrix)
# Mirrors GitHub workflow: ruff check only, no format check.
# ---------------------------------------------------------------------------

lint:
  stage: lint
  image: python:3.12
  tags:
    - saas-linux-small-amd64
  before_script:
    - python -m pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - ruff check .

# ---------------------------------------------------------------------------
# Linux test matrix: Python 3.12 and 3.13
# Mirrors GitHub Actions Linux jobs.
# GUI tests excluded on Linux (GUI is Windows-only per project policy).
# Using non-slim Debian images to ensure PySide6 system dependencies
# (libglib2.0-0 etc.) are present out of the box.
# ---------------------------------------------------------------------------

.test-linux:
  stage: test
  tags:
    - saas-linux-small-amd64
  before_script:
    # System libraries required by PySide6 (mirrors GitHub workflow)
    - apt-get update -qq
    - apt-get install -y -qq libegl1 libxkbcommon0 libxkbcommon-x11-0 libdbus-1-3 libxcb-cursor0 libgl1
    - python -m pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - mypy
    - pytest --ignore=tests/gui

test:linux:3.12:
  extends: .test-linux
  image: python:3.12

test:linux:3.13:
  extends: .test-linux
  image: python:3.13

# ---------------------------------------------------------------------------
# Windows test matrix: Python 3.12 and 3.13
# Uses Chocolatey to install Python (no Docker executor on Windows runners).
# Chocolatey ships separate packages per Python minor version: python312,
# python313. The generic "python" package does not support --version pinning.
# After install, refresh PATH via Chocolatey's PowerShell profile module,
# since the cmd-based refreshenv does not work in PowerShell sessions.
# Note: Windows runners on GitLab.com are in beta; longer provisioning time
# (~5 min per job) is expected.
# ---------------------------------------------------------------------------

.test-windows:
  stage: test
  tags:
    - saas-windows-medium-amd64
  before_script:
    # PowerShell is the default shell on Windows runners
    - choco install $env:PYTHON_PACKAGE -y --no-progress
    - Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
    - Update-SessionEnvironment
    - python --version
    - python -m pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - mypy
    - pytest

test:windows:3.12:
  extends: .test-windows
  variables:
    PYTHON_PACKAGE: "python312"

test:windows:3.13:
  extends: .test-windows
  variables:
    PYTHON_PACKAGE: "python313"

# ---------------------------------------------------------------------------
# Security job: SAST (bandit) + dependency audit (pip-audit)
# Single Linux/3.12 leg — scans are platform-independent.
# Mirrors the GitHub Actions security job.
# ---------------------------------------------------------------------------

security:
  stage: security
  image: python:3.12
  tags:
    - saas-linux-small-amd64
  before_script:
    - python -m pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    # -ll = medium-and-above severity gate; low findings are informational only.
    # To suppress a finding: add "# nosec <ID>  # reason" at the call site.
    - bandit -r src -c pyproject.toml -ll
    # Blocking. To accept an unfixable transitive advisory, add
    # "pip-audit --ignore-vuln <VULN-ID>" and document the justification here.
    - pip-audit
