<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JWE — Neon Dark Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: #060b13; }
</style>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#0a1119" />
    <rect x="30" y="30" width="24" height="24" rx="5" fill="none" stroke="#22d3ee" stroke-width="4" />
    <rect x="46" y="46" width="24" height="24" rx="5" fill="#22d3ee" fill-opacity="0.2" stroke="#22d3ee" stroke-width="4" />
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="app-window.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;

  function Mount() {
    return (
      <DesignCanvas>
        <DCSection id="mono" title="Jira Worklog Exporter — Technical / Mono" subtitle="Gewählte Richtung · monospace Labels & Werte, Bracket-Indizes, Terminal-Log · voll interaktiv">
          <DCArtboard id="mono-empty" label="Leerer Start" width={1080} height={1180}>
            <AppWindow variant="mono" initialLang="de" />
          </DCArtboard>
          <DCArtboard id="mono-done" label="Export abgeschlossen" width={1080} height={1180}>
            <AppWindow variant="mono" initialLang="de" initialState="done" />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Mount />);
</script>
</body>
</html>
